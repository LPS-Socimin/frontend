<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socimin</title>
    <link rel="stylesheet" href="core/global.css">
    <style>
        /* Estilos do Indicador de Carregamento Global */
        #global-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.7);
            display: none; /* Inicia oculto */
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            transition: opacity 0.2s;
        }
        .loader-spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Indicador de Carregamento -->
    <div id="global-loader">
        <div class="loader-spinner"></div>
    </div>

    <!-- Raiz da Aplicação -->
    <div id="app-root"></div>

    <!-- Scripts Core (ORDEM CORRIGIDA E COM DEFER) -->
    <script src="core/gateway.js" defer></script>
    <script src="core/router.js" defer></script>
    <script src="core/app.js" defer></script>
</body>
</html>
