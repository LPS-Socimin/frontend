<div class="perfil-card">
    <h2>Criar Novo Fórum</h2>
    
    <form id="form-criar-forum" style="display: flex; flex-direction: column; gap: 15px; margin-top: 15px;">
        
        <input type="text" id="input-nome-forum" placeholder="Nome do Fórum" class="input-padrao" required>
        
        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn-moderno" style="flex: 1;">Criar</button>
            <button type="button" id="btn-cancelar-forum" class="btn-secundario" style="flex: 1;">Cancelar</button>
        </div>
        
    </form>
</div>
