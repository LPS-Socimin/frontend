<div class="login-container">
    <h1 class="logo">Socimin</h1>
    <div class="nav-botoes">
        <button type="button" id="btn-nav-blog" class="btn-secundario">Blog</button>
        <button type="button" id="btn-nav-forum" class="btn-secundario">Fórum</button>
    </div>
    
    <form id="login-form">
        <div id="msg-login" class="msg-box" style="display: none;"></div>
        
        <input type="email" id="email-login" placeholder="E-mail" required>
        <input type="password" id="senha-login" placeholder="Senha" required>
        <button type="submit" id="btn-entrar">Entrar</button>
        <p class="toggle-form">Não tem conta? <a href="#" id="link-cadastro">Cadastre-se</a></p>
    </form>
    
    <form id="cadastro-form" style="display: none;">
        <div id="msg-cadastro" class="msg-box" style="display: none;"></div>
        
        <input type="text" id="handle-cadastro" placeholder="Nome de Usuário (Handle)" required>
        <input type="email" id="email-cadastro" placeholder="E-mail" required>
        <input type="password" id="senha-cadastro" placeholder="Senha" required>
        <input type="password" id="confirmacao-senha" placeholder="Confirmar Senha" required>
        <button type="submit" id="btn-cadastrar">Cadastrar</button>
        <p class="toggle-form">Já tem conta? <a href="#" id="link-login">Faça Login</a></p>
    </form>
</div>
